<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JetLagPro Flyer — Option C</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        @page { size: 5.5in 8.5in; margin: 0.3in; }

        :root {
            --blue: #2563EB;
            --ink: #111827;
            --muted: #6B7280;
            --gold: #B45309;
        }

        * { box-sizing: border-box; }

        body {
            font-family: Inter, Arial, sans-serif;
            margin: 0;
            padding: 0.35in 0.4in;
            background: white;
            width: 5.5in;
            height: 8.5in;
            color: var(--ink);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .qr-hero {
            margin: 0.15in 0 0.22in;
        }

        .qr-code {
            width: 2.35in;
            height: 2.35in;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 28px rgba(37, 99, 235, 0.15);
            margin: 0 auto;
        }

        .qr-code img {
            width: 100%;
            height: 100%;
            display: block;
        }

        .scan-hint {
            font-size: 13px;
            color: var(--muted);
            margin: 0.12in 0 0;
        }

        .brand-name {
            font-size: 36px;
            font-weight: 700;
            color: var(--blue);
            margin: 0 0 0.06in;
            letter-spacing: -0.03em;
        }

        .tagline {
            font-size: 17px;
            font-weight: 600;
            color: var(--ink);
            margin: 0 0 0.04in;
        }

        .free-line {
            font-size: 15px;
            color: var(--gold);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin: 0 0 0.22in;
        }

        .wheel-image {
            width: 1.85in;
            height: 1.85in;
            border-radius: 14px;
            margin-bottom: 0.2in;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        .facts {
            margin: 0;
            padding: 0;
            list-style: none;
            font-size: 15px;
            line-height: 1.55;
            color: var(--muted);
        }

        .facts li {
            margin: 0.05in 0;
        }

        .facts strong {
            color: var(--ink);
            font-weight: 600;
        }

        .divider {
            width: 0.6in;
            height: 3px;
            background: var(--gold);
            border: none;
            margin: 0.18in auto;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="qr-hero">
        <div class="qr-code">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://apps.apple.com/us/app/jetlagpro/id6748569048" alt="QR Code for JetLagPro on the App Store" />
        </div>
        <p class="scan-hint">Point your phone camera here</p>
    </div>

    <h1 class="brand-name">JetLagPro</h1>
    <p class="tagline">Timed pressure points for travel</p>
    <p class="free-line">Free on the App Store</p>

    <hr class="divider" />

    <img src="assets/images/AppIconNew1024.png" alt="JetLagPro organ clock" class="wheel-image" />

    <ul class="facts">
        <li><strong>12 points</strong> · 1 minute each</li>
        <li><strong>Destination-time</strong> reminders</li>
        <li>iPhone · iPad · Apple Watch</li>
        <li>No account required</li>
    </ul>
</body>
</html>
